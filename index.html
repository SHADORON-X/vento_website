<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ff6200" />

  <!-- SEO -->
  <title>Velmo — Logiciel de Caisse & Gestion pour Petits Commerces</title>
  <meta name="description"
    content="Velmo est le logiciel de caisse #1 pour les commerçants en Afrique. Gérez vos stocks, ventes et dettes sans internet. Vitrine web et rapports WhatsApp." />
  <meta name="keywords"
    content="logiciel de caisse afrique, gestion de stock, velmo, gestion boutique, pos mobile, boutique en ligne gratuite, suivi dettes, commerçant" />
  <link rel="canonical" href="https://velmo.org/" />

  <!-- Preconnect Supabase + Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cqpcwqqjbcgklrvnqpxr.supabase.co" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  
  <script>
    /* Anti-FOUC : applique le thème sauvegardé avant que React se charge */
    (function() {
      var t = localStorage.getItem('velmo-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
      if (t === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    body { background: #f8fafc; margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    html.dark body { background: #080b10; }
    #root:empty { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .instant-loader { display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fadeIn 0.5s ease-out; }
    .loader-ring { width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(249, 115, 22, 0.1); border-top-color: #f97316; animation: spin 0.8s linear infinite; }
    .loader-text { color: #f97316; font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body>
  <div id="root">
    <div class="instant-loader">
      <div class="loader-ring"></div>
      <div class="loader-text">Démarrage Velmo...</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
