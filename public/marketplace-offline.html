<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velmo Market — Hors ligne</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e2e8f0;text-align:center;padding:24px}
    .card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:48px 32px;max-width:400px;width:100%}
    .icon{font-size:64px;margin-bottom:24px}
    h1{font-size:22px;font-weight:800;color:#f8fafc;margin-bottom:10px}
    p{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:24px}
    .btn{display:inline-block;background:#f97316;color:#fff;font-weight:700;font-size:14px;padding:12px 28px;border-radius:12px;border:none;cursor:pointer;text-decoration:none}
    .btn:hover{background:#ea6c00}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Vous êtes hors ligne</h1>
    <p>Impossible de charger Velmo Market.<br>Vérifiez votre connexion internet et réessayez.</p>
    <button class="btn" onclick="window.location.reload()">🔄 Réessayer</button>
  </div>
</body>
</html>
